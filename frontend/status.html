<html lang="ru">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статус сервиса — Magic Master</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <meta name="description" content="Статус сервиса Magic Master" data-i18n-content="status.meta_desc">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810; --surface: rgba(16,16,28,0.95); --border: rgba(255,255,255,0.08);
      --text: #e8e8f0; --text-soft: #9898b8; --text-dim: #52527a;
      --accent: #6c4bff; --accent2: #a855f7;
      --green: #34d399; --red: #f87171; --amber: #fbbf24; --blue: #60a5fa;
      --r: 10px; --mono: 'Space Grotesk', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(108,75,255,.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 90% 85%, rgba(168,85,247,.08) 0%, transparent 55%);
    }
    .container { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 2.5rem 1.2rem 4rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .logo {
      display: inline-flex; align-items: center; gap: .45rem;
      text-decoration: none;
    }
    .logo-mark { height: 24px; width: auto; max-width: min(300px, 88vw); display: block; flex-shrink: 0; }
    .logo-type {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-weight: 700; font-size: 1.02rem; letter-spacing: -.03em;
      background: linear-gradient(90deg, #c4b5fd 0%, #93c5fd 45%, #67e8f9 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .last-check { font-size: .75rem; color: var(--text-dim); }

    /* Overall status banner */
    .banner { border-radius: var(--r); padding: 1.2rem 1.4rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
    .banner-ok  { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.25); }
    .banner-deg { background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.2); }
    .banner-err { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); }
    .banner-icon { font-size: 2rem; flex-shrink: 0; }
    .banner-title { font-size: 1.15rem; font-weight: 700; }
    .banner-sub { font-size: .82rem; color: var(--text-soft); margin-top: .25rem; }

    /* Components */
    .section-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .07em; color: var(--text-dim); margin-bottom: .7rem; }
    .comp-list { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 2rem; }
    .comp-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
      padding: .85rem 1rem; display: flex; align-items: center; gap: .8rem;
    }
    .comp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok   { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,.5); }
    .dot-warn { background: var(--amber); box-shadow: 0 0 6px rgba(251,191,36,.5); }
    .dot-err  { background: var(--red);   box-shadow: 0 0 6px rgba(248,113,113,.5); }
    .comp-name { font-weight: 600; font-size: .9rem; flex: 1; }
    .comp-badge { font-size: .72rem; padding: .15rem .55rem; border-radius: 4px; font-weight: 700; font-family: var(--mono); }
    .badge-ok   { background: rgba(52,211,153,.15); color: var(--green); }
    .badge-warn { background: rgba(251,191,36,.12); color: var(--amber); }
    .badge-err  { background: rgba(248,113,113,.12); color: var(--red); }
    .comp-detail { font-size: .75rem; color: var(--text-soft); margin-top: .15rem; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: .8rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: .9rem 1rem; }
    .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent2); font-family: var(--mono); }
    .stat-lbl { font-size: .72rem; color: var(--text-soft); margin-top: .2rem; }

    /* Footer */
    .footer { margin-top: 2.5rem; text-align: center; font-size: .75rem; color: var(--text-dim); }
    .footer a { color: var(--accent2); text-decoration: none; }
    .refresh-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-soft); font-size: .78rem; padding: .35rem .8rem; cursor: pointer;
      font-family: inherit; transition: border-color .15s;
    }
    .refresh-btn:hover { border-color: rgba(108,75,255,.4); color: var(--accent2); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .loading { animation: pulse 1.2s ease infinite; }
    .mm-auth-lang { display: flex; gap: .35rem; font-size: .8rem; color: var(--text-dim); align-items: center; }
    .mm-auth-lang a { color: var(--text-soft); text-decoration: none; font-weight: 600; }
    .mm-auth-lang a.mm-lang-active { color: var(--accent2); text-decoration: underline; }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <div class="header">
    <a href="/" class="logo"><img class="logo-mark" src="/icons/mm-icon.png" alt="" decoding="async"/><span class="logo-type">Magic Master</span></a>
    <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;justify-content:flex-end">
      <div class="mm-auth-lang" aria-label="Language">
        <a href="#" data-mm-lang="ru" data-i18n="common.lang_ru">RU</a>
        <span>|</span>
        <a href="#" data-mm-lang="en" data-i18n="common.lang_en">EN</a>
      </div>
      <span class="last-check" id="lastCheck" data-i18n="status.loading">Загрузка…</span>
      <button class="refresh-btn" type="button" onclick="loadStatus()" data-i18n="status.refresh">↻ Обновить</button>
    </div>
  </div>

  <!-- Banner -->
  <div class="banner banner-ok loading" id="banner">
    <div class="banner-icon" id="bannerIcon">⏳</div>
    <div>
      <div class="banner-title" id="bannerTitle" data-i18n="status.banner_check">Проверка состояния…</div>
      <div class="banner-sub" id="bannerSub" data-i18n="status.banner_fetch">Получаем данные с сервера</div>
    </div>
  </div>

  <!-- Компоненты -->
  <div class="section-title" data-i18n="status.section_components">Компоненты</div>
  <div class="comp-list" id="compList">
    <div class="comp-row"><div class="comp-dot dot-ok loading"></div><div class="comp-name">…</div></div>
  </div>

  <!-- Статистика -->
  <div class="section-title" data-i18n="status.section_stats">Статистика</div>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card loading"><div class="stat-val">—</div><div class="stat-lbl">…</div></div>
  </div>

  <div class="footer">
    <span data-i18n="status.footer_auto">Страница обновляется каждые 30 секунд ·</span> <a href="/" data-i18n="status.footer_back">Вернуться в приложение</a>
  </div>
</div>

<script src="/i18n.js"></script>
<script>
MagicMasterI18n.init({ pageTitleKey: 'status.page_title' }).then(function () {
const API = '';

function t(k) { return (typeof window.__t === 'function' ? window.__t(k) : k); }
function tpl(s, o) {
  if (!s) return '';
  return s.replace(/\{(\w+)\}/g, function (_, k) { return o[k] != null ? String(o[k]) : ''; });
}

function statusColor(s) {
  if (s === 'ok')  return 'ok';
  if (s === 'low' || s === 'degraded' || s === 'missing') return 'warn';
  return 'err';
}
function dotClass(s)   { return 'dot-'   + statusColor(s); }
function badgeClass(s) { return 'badge-' + statusColor(s); }
function badgeLabel(s) {
  if (s === 'ok')          return t('status.badge_ok');
  if (s === 'low')         return t('status.badge_low');
  if (s === 'degraded')    return t('status.badge_deg');
  if (s === 'missing')     return t('status.badge_miss');
  if (s === 'unavailable') return t('status.badge_unav');
  if (s === 'error')       return t('status.badge_err');
  return s;
}

function fmtUptime(isoStr) {
  if (!isoStr) return '—';
  const started = new Date(isoStr.endsWith('Z') ? isoStr : isoStr + 'Z');
  const diffMs = Date.now() - started.getTime();
  const h = Math.floor(diffMs / 3600000);
  const m = Math.floor((diffMs % 3600000) / 60000);
  const ud = t('status.uptime_d'), uh = t('status.uptime_h'), um = t('status.uptime_m');
  if (h >= 24) return Math.floor(h/24) + ud + ' ' + (h%24) + uh + ' ' + m + um;
  return h + uh + ' ' + m + um;
}

async function loadStatus() {
  const loc = (typeof MagicMasterI18n !== 'undefined' && MagicMasterI18n.getLang() === 'en') ? 'en-US' : 'ru-RU';
  try {
    const r = await fetch(API + '/api/health');
    const d = await r.json();

    // Убираем loading-анимацию
    document.querySelectorAll('.loading').forEach(el => el.classList.remove('loading'));

    // Banner
    const banner = document.getElementById('banner');
    const icon   = document.getElementById('bannerIcon');
    const title  = document.getElementById('bannerTitle');
    const sub    = document.getElementById('bannerSub');
    banner.className = 'banner';
    const buildPart = d.build_date ? ' · ' + d.build_date : '';
    const ver = d.version || '—';
    if (d.status === 'ok') {
      banner.classList.add('banner-ok');
      icon.textContent  = '✅';
      title.textContent = t('status.banner_all_ok');
      sub.textContent   = tpl(t('status.banner_sub_ok'), { version: ver, build: buildPart, uptime: fmtUptime(d.uptime_since) });
    } else if (d.status === 'degraded') {
      banner.classList.add('banner-deg');
      icon.textContent  = '⚠️';
      title.textContent = t('status.banner_deg_title');
      sub.textContent   = tpl(t('status.banner_sub_deg'), { version: ver, build: buildPart });
    } else {
      banner.classList.add('banner-err');
      icon.textContent  = '❌';
      title.textContent = t('status.banner_err_title');
      sub.textContent   = tpl(t('status.banner_sub_err'), { version: ver, build: buildPart });
    }

    // Компоненты
    const comps = d.components || {};
    const compDefs = [
      { key: 'database', label: t('status.comp_db') },
      { key: 'disk',     label: t('status.comp_disk') },
      { key: 'ffmpeg',   label: t('status.comp_ffmpeg') },
    ];
    const compHtml = compDefs.map(def => {
      const comp = comps[def.key] || { status: 'unknown' };
      const s = comp.status || 'unknown';
      let detail = '';
      if (def.key === 'disk' && comp.free_mb != null) {
        detail = tpl(t('status.disk_free_tpl'), { mb: comp.free_mb.toLocaleString(loc) });
      }
      if (comp.detail) detail = comp.detail;
      return `<div class="comp-row">
        <div class="comp-dot ${dotClass(s)}"></div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:.6rem">
            <span class="comp-name">${def.label}</span>
            <span class="comp-badge ${badgeClass(s)}">${badgeLabel(s)}</span>
          </div>
          ${detail ? `<div class="comp-detail">${detail}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    document.getElementById('compList').innerHTML = compHtml;

    // Статистика
    const jobs = d.jobs || {};
    const statsHtml = [
      { val: [d.version, d.build_date].filter(Boolean).join(' · ') || '—', lbl: t('status.stat_ver') },
      { val: fmtUptime(d.uptime_since),   lbl: 'Uptime' },
      { val: d.python   || '—',           lbl: 'Python' },
      { val: jobs.running ?? '—',         lbl: t('status.stat_jobs_run') },
      { val: jobs.total_cached ?? '—',    lbl: t('status.stat_jobs_cache') },
      { val: comps.disk?.free_mb != null ? comps.disk.free_mb.toLocaleString(loc) + ' ' + t('status.mb') : '—', lbl: t('status.stat_disk_free') },
    ].map(s => `<div class="stat-card">
      <div class="stat-val">${s.val}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');
    document.getElementById('statsGrid').innerHTML = statsHtml;

    // Время проверки
    document.getElementById('lastCheck').textContent =
      t('status.updated') + ' ' + new Date().toLocaleTimeString(loc, { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  } catch (e) {
    document.getElementById('banner').className = 'banner banner-err';
    document.getElementById('bannerIcon').textContent = '❌';
    document.getElementById('bannerTitle').textContent = t('status.banner_unavail');
    document.getElementById('bannerSub').textContent = e.message;
    document.getElementById('lastCheck').textContent = t('status.conn_err');
  }
}

loadStatus();
// Автообновление каждые 30 секунд
setInterval(loadStatus, 30000);
}); // MagicMasterI18n.init
</script>
