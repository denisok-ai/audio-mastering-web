<script>
(function(){
  var tok=localStorage.getItem('mm_token');
  if(!tok){document.getElementById('guest').style.display='block';return;}
  document.getElementById('auth').style.display='block';
  fetch('/api/referral/my-link',{headers:{'Authorization':'Bearer '+tok}}).then(function(r){return r.ok?r.json():Promise.reject();}).then(function(d){
    document.getElementById('link').value=d.referral_url||'';
    document.getElementById('tlink').value=d.bot_referral_url||'';

    document.getElementById('stats').innerHTML='<strong>Статистика</strong><br>Приглашено: '+s.total_invited+'<br>С наградой: '+s.total_rewarded;
  });
