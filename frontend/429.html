  const params = new URLSearchParams(location.search);
  const retryAfter = parseInt(params.get('retry')) || 60;
  let remaining = retryAfter;
  const countEl = document.getElementById('countdown');
  const retryBtn = document.getElementById('retryBtn');
  const t = typeof window.__t === 'function' ? window.__t : function(k) { return k; };

  function tick() {
    if (remaining <= 0) {
      countEl.textContent = t('err429.countdown_ready');
      retryBtn.disabled = false;
      return;
    }
    const m = Math.floor(remaining / 60), s = remaining % 60;
    countEl.textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}${t('err429.sec')}`;
    remaining--;
    setTimeout(tick, 1000);
  }
  tick();
});
</script>
