# Временный конфиг: только HTTP + ACME webroot + прокси на приложение.
# Нужен до первого выпуска Let's Encrypt (пока нет fullchain.pem).
# После certbot заменяется на magic-master.conf (HTTPS).

upstream magic_master {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name magicmaster.pro www.magicmaster.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/sites-available/magic-master-proxy.inc;
}
