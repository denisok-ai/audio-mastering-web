# /etc/nginx/conf.d/gzip.conf — расширенная gzip-конфигурация
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/xhtml+xml
    application/manifest+json
    application/vnd.ms-fontobject
    font/opentype
    font/ttf
    font/woff
    font/woff2
    image/svg+xml
    image/x-icon;
