# Magic Master — Nginx конфиг для systemd-деплоя (без Docker)
# Сервер: 6 vCPU / 12 GB RAM / Ubuntu 22.04
#
# Установка:
#   sudo cp magic-master.conf /etc/nginx/sites-available/magic-master
#   sudo ln -s /etc/nginx/sites-available/magic-master /etc/nginx/sites-enabled/magic-master
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Автоматически устанавливается через deploy/deploy.sh

upstream magic_master {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Gzip сжатие ────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml;

# HTTP → HTTPS редирект (раскомментировать после получения SSL сертификата)
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Временно: обслуживаем HTTP до настройки SSL
    # После получения сертификата замените на:
    #   return 301 https://$host$request_uri;
    include /etc/nginx/sites-available/magic-master-proxy.inc;
}

