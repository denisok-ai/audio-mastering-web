# Magic Master — Nginx: magicmaster.pro + HTTPS (Let's Encrypt)
# Прокси: [magic-master-proxy.inc](magic-master-proxy.inc)
#
# Первый выпуск сертификата без файлов в /etc/letsencrypt/live/magicmaster.pro/:
#   см. doc/MAGICMASTER_PRO.md (certbot certonly --standalone или временно только HTTP).
#
# Установка:
#   sudo mkdir -p /var/www/certbot
#   sudo cp deploy/nginx/magic-master.conf /etc/nginx/sites-available/magic-master
#   sudo cp deploy/nginx/magic-master-proxy.inc /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/magic-master /etc/nginx/sites-enabled/magic-master
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream magic_master {
    server 127.0.0.1:8000;
    keepalive 32;
}

# gzip задаётся в /etc/nginx/nginx.conf — не дублировать здесь

# HTTP: ACME для certbot renew, остальное → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name magicmaster.pro www.magicmaster.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (Let's Encrypt). Для nginx 1.25.1+ можно заменить на listen 443 ssl + http2 on;
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name magicmaster.pro www.magicmaster.pro;

    ssl_certificate     /etc/letsencrypt/live/magicmaster.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magicmaster.pro/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # OCSP stapling: у LE часто нет URL в сертификате — nginx выдаёт предупреждение
    ssl_stapling off;
    ssl_stapling_verify off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    include /etc/nginx/sites-available/magic-master-proxy.inc;
}
