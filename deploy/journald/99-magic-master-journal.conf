# Ограничение размера persistent journal (systemd-journald).
# Установка на сервере:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp deploy/journald/99-magic-master-journal.conf /etc/systemd/journald.conf.d/
#   sudo systemctl restart systemd-journald
#
# Логи приложения (uvicorn/FastAPI) идут в journal через unit magic-master.service.

[Journal]
# Верхняя граница места на диске для журналов (все сервисы на машине).
SystemMaxUse=512M
# Удалять записи старше (опционально; закомментируйте, если нужна только отсечка по размеру).
MaxRetentionSec=14day
